user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # 全局 SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'HIGH:!aNULL:!MD5:!RC4:!3DES';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    upstream backend_app {
        # 【修正】必须添加 server 关键字，并指向真实的容器名
        server langchainagent-app:8000;
    }

    upstream spring_backend_app {
        # 【修正】指向 Java 容器真名
        server springboot-app:8080;
    }

    server {
        listen       80;
        server_name  _;
        return 301 https://$host$request_uri;
    }

    server {
        listen              443 ssl http2;
        server_name         _;

        client_max_body_size 16m;

        root /usr/share/nginx/html;
        index index.html index.htm;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Python 后端接口
        location /api/ {
            # 【修正】这里应该转发到定义的 upstream 名 backend_app
            proxy_pass         http://backend_app;
        proxy_http_version 1.1;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    3600s;  # 建议加长
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # === SSE/流式接口关键配置 ===
        proxy_buffering off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        }

        # Spring Boot 后端接口
        location /java-api/ {
            # 转发到 spring_backend_app。注意：如果后端没配置 context-path，此处路径拼接需小心
            proxy_pass         http://spring_backend_app/api/;
            proxy_http_version 1.1;
            proxy_buffering        off;
            proxy_cache_bypass     $http_upgrade;
            proxy_set_header       Connection "keep-alive";
            proxy_set_header       Upgrade $http_upgrade;
            chunked_transfer_encoding on;
            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_read_timeout    3600s;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}