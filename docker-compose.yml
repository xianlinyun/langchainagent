services:
  java_backend:
    build:
      context: ./spring-ai/law-backend-springboot # 指向 Spring Boot 子项目根目录
      dockerfile: Dockerfile # 使用该目录下的 Dockerfile
    container_name: springboot-app
    ports:
      - "8081:8080" # Spring Boot 配置的端口为 8080
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # 如果需要连接下方的 Python App，可以使用 http://langchainagent-app:8000
      - PYTHON_APP_URL=http://langchainagent-app:8000
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    restart: always
  app:
    build:
      context: ./src
      dockerfile: dockerfile
    container_name: langchainagent-app
    # 使用默认 bridge 网络，通过端口映射暴露给宿主机
    # 从项目根目录加载环境变量文件
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/app/model_cache
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
      - ./chroma_db:/app/chroma_db
    restart: always

  # embedding_api:
