  #   volumes:
  #     - ./model_cache:/app/model_cache
  #     - ./chroma_db:/app/chroma_db
  #     - ./config:/app/config
  #   restart: always

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_proxy
    # 使用默认 bridge 网络，通过 80/443 端口对外暴露
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 将宿主机的 SSL 证书目录挂载到容器
      # 请在 ./nginx/certs 下放置 fullchain.pem 和 privkey.pem
      - ./nginx/certs:/etc/nginx/certs:ro
      # 前端构建产物目录
      - ./law_agent/dist:/usr/share/nginx/html:ro
      # 单独挂载 favicon.ico，确保根路径下可以访问到
      - ./law_agent/public/favicon.ico:/usr/share/nginx/html/favicon.ico:ro
    depends_on:
      - app
    restart: always

  mysql:
    image: mysql:8.0
    container_name: mysql_law
    # 对外暴露 MySQL 端口，如果宿主机已有 MySQL，可改成其它端口
    ports:
      - "3307:3306"
    environment:
      # 与 Spring Boot application.yml 中保持一致
      - MYSQL_ROOT_PASSWORD=henu
      - MYSQL_DATABASE=law
      - TZ=Asia/Shanghai
    volumes:
      # 数据持久化目录
      - ./mysql/data:/var/lib/mysql
      # 初始化 SQL 目录，把 backup.sql 放到这里，首次启动会自动导入
      - ./mysql/init:/docker-entrypoint-initdb.d
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -P 3306 -u root -p$MYSQL_ROOT_PASSWORD
            || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
